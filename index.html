<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>매장 리뷰 브리핑</title>
<style>
 *{box-sizing:border-box}
 body{font-family:-apple-system,'Apple SD Gothic Neo','Helvetica Neue',sans-serif;margin:0;background:#f5f4f2;color:#1a1a1a;-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
 .kicker{font-size:10.5px;letter-spacing:.28em;color:#a39d92;text-transform:uppercase}
 /* gate */
 #gate{max-width:520px;margin:24vh auto 0;text-align:center;padding:0 20px}
 #gate h2{font-weight:700;font-size:21px;margin:12px 0 6px}
 #gate p{color:#8a857c;font-size:13px;margin:0 0 24px}
 #gate input{font-size:15px;padding:13px 15px;border:1px solid #d8d4cd;width:230px;background:#fff;outline:none}
 #gate input:focus{border-color:#1a1a1a}
 #gate button{font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:13px 24px;border:0;background:#1a1a1a;color:#fff;margin-left:8px;cursor:pointer}
 #err{color:#b4453a;margin-top:14px;min-height:20px;font-size:13px}
 /* app */
 #app{display:none;max-width:1180px;margin:0 auto;min-height:100vh}
 .side{width:236px;flex:none;padding:34px 20px;border-right:1px solid #e6e3dd;position:sticky;top:0;align-self:flex-start;height:100vh;overflow:auto}
 .side h1{font-size:18px;font-weight:700;margin:8px 0 26px}
 .navsec{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#a39d92;margin:22px 0 8px}
 .navitem{display:flex;justify-content:space-between;align-items:center;padding:9px 10px;font-size:14px;cursor:pointer;border-radius:0;color:#3a362f}
 .navitem:hover{background:#ece9e3}
 .navitem.on{background:#1a1a1a;color:#fff}
 .navitem .mini{font-size:11px;color:#a39d92}
 .navitem.on .mini{color:#c9c3b6}
 .main{flex:1;padding:40px 38px 90px;min-width:0}
 .h-row{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid #e2dfd9;padding-bottom:16px;margin-bottom:8px}
 .main h2.title{font-size:25px;font-weight:700;margin:6px 0 0}
 .cards{display:flex;gap:12px;flex-wrap:wrap;margin:22px 0 6px}
 .card{background:#fff;border:1px solid #ebe8e3;padding:16px 18px;flex:1;min-width:130px}
 .card .v{font-size:24px;font-weight:700}
 .card .l{font-size:11px;letter-spacing:.06em;color:#9a958c;margin-top:4px;text-transform:uppercase}
 section.blk{background:#fff;border:1px solid #ebe8e3;padding:22px 24px;margin:16px 0}
 section.blk>h3{font-size:13px;font-weight:700;letter-spacing:.02em;margin:0 0 4px}
 section.blk>.sub{font-size:11.5px;color:#a39d92;margin:0 0 16px}
 .future{opacity:.55}
 .future-tag{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#b9a88f;border:1px solid #e7ded0;padding:2px 7px;margin-left:8px;vertical-align:middle}
 /* hbar */
 .chart .row{display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:12px;padding:5px 0}
 .rlab{font-size:13px;color:#3a362f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .rbar{background:#f0ede8;height:9px;position:relative}
 .rbar span{position:absolute;left:0;top:0;height:100%;background:#1a1a1a}
 .rval{font-size:12.5px;font-weight:600;text-align:right;white-space:nowrap}
 .rval em{font-style:normal;font-weight:400;color:#a39d92;margin-left:5px;font-size:11px}
 /* table */
 table.lb{width:100%;border-collapse:collapse;font-size:13px}
 table.lb th{text-align:right;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#a39d92;font-weight:600;padding:0 0 10px;border-bottom:1px solid #eee7db}
 table.lb th:first-child,table.lb td:first-child{text-align:left}
 table.lb td{padding:11px 0;border-bottom:1px solid #f3f0ea;text-align:right}
 table.lb td.nm{font-weight:600;cursor:pointer}
 table.lb td.nm:hover{text-decoration:underline}
 /* line chart */
 svg.ln{width:100%;height:auto;display:block}
 .lg{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;font-size:11.5px;color:#6a655c}
 .lg i{display:inline-block;width:10px;height:10px;margin-right:5px;vertical-align:-1px}
 .note{font-size:12.5px;color:#a39d92;background:#faf9f7;border:1px dashed #e2dfd9;padding:14px 16px;text-align:center}
 /* report */
 pre.report{white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:14px;line-height:1.8;color:#3a362f;margin:0}
 /* calendar */
 .cal{margin-top:6px}
 .cal .mh{font-size:12px;font-weight:700;margin:10px 0 6px}
 .cal .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
 .cal .d{font-size:11px;text-align:center;padding:5px 0;color:#cdc8bd}
 .cal .d.has{color:#1a1a1a;background:#ece9e3;cursor:pointer;font-weight:600}
 .cal .d.has:hover{background:#1a1a1a;color:#fff}
 .cal .dow{font-size:9.5px;color:#bdb8ae;text-align:center;padding:3px 0}
 .det{border-top:1px solid #eee7db}
 .det summary{cursor:pointer;font-weight:700;font-size:14px;padding:14px 0;list-style:none}
 .det summary::-webkit-details-marker{display:none}
 @media(max-width:780px){
  #app{display:block!important}
  .side{width:auto;position:static;height:auto;border-right:0;border-bottom:1px solid #e6e3dd}
  .main{padding:26px 18px 70px}
  .chart .row{grid-template-columns:96px 1fr auto}
 }
</style></head><body>
<div id="gate">
  <div class="kicker">STORE REVIEW BRIEFING</div>
  <h2>리뷰 브리핑</h2>
  <p>비밀번호를 입력하세요</p>
  <input id="pw" type="password" autofocus onkeydown="if(event.key==='Enter')go()">
  <button onclick="go()">열기</button>
  <div id="err"></div>
</div>

<div id="app">
  <aside class="side" id="side"></aside>
  <main class="main" id="main"></main>
</div>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
let DATA=null, VIEW={t:'dash'};

async function go(){
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err'); err.textContent='여는 중...';
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
    DATA=JSON.parse(new TextDecoder().decode(pt));
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='flex';
    renderSide(); render();
  }catch(e){ err.textContent='비밀번호가 틀렸습니다'; }
}

/* helpers */
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct=x=>x==null?'—':Math.round(x*100)+'%';
const num=x=>x==null?'—':Number(x).toLocaleString('ko');
const PAL=['#1a1a1a','#7d7261','#a9967c','#5f6f60','#9c8aa0','#8a7f6d','#b9a88f','#6d7b6e'];
const stores=d=>d&&d.stores||[];
const latest=()=>DATA[0];
const daysAsc=()=>[...DATA].reverse();
const findS=(d,name)=>stores(d).find(x=>x.name===name);

/* charts */
function hbar(items,opt){
  opt=opt||{}; const max=opt.max||Math.max(1,...items.map(i=>i.value||0));
  const fmt=opt.fmt||(v=>v);
  return '<div class="chart">'+items.map(i=>
    '<div class="row"><div class="rlab">'+esc(i.label)+'</div>'+
    '<div class="rbar"><span style="width:'+Math.max(2,(i.value||0)/max*100)+'%'+(i.color?';background:'+i.color:'')+'"></span></div>'+
    '<div class="rval">'+(i.disp!=null?esc(i.disp):esc(fmt(i.value)))+(i.sub?'<em>'+esc(i.sub)+'</em>':'')+'</div></div>'
  ).join('')+'</div>';
}

function line(labels,series,opt){
  opt=opt||{};
  if(labels.length<2) return '<div class="note">데이터 누적 중 — '+labels.length+'일째예요. 며칠 더 쌓이면 추세선이 그려집니다.</div>';
  const W=640,H=190,pad=30;
  const all=series.flatMap(s=>s.points.filter(v=>v!=null));
  let mn=Math.min(...all), mx=Math.max(...all); if(mn===mx){mn-=1;mx+=1;}
  const X=i=>pad+(W-2*pad)*(labels.length<2?0:i/(labels.length-1));
  const Y=v=>H-pad-(H-2*pad)*((v-mn)/(mx-mn));
  let g='';
  for(let k=0;k<=3;k++){const v=mn+(mx-mn)*k/3,y=Y(v);
    g+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad)+'" y2="'+y+'" stroke="#f0ede8"/>'+
       '<text x="'+(pad-6)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="#bdb8ae">'+(opt.yfmt?opt.yfmt(v):Math.round(v))+'</text>';}
  const lines=series.map((s,si)=>{
    const pts=s.points.map((v,i)=>v==null?null:X(i)+','+Y(v)).filter(Boolean).join(' ');
    const dots=s.points.map((v,i)=>v==null?'':'<circle cx="'+X(i)+'" cy="'+Y(v)+'" r="2.5" fill="'+PAL[si%PAL.length]+'"/>').join('');
    return '<polyline points="'+pts+'" fill="none" stroke="'+PAL[si%PAL.length]+'" stroke-width="2"/>'+dots;
  }).join('');
  const xl=labels.map((l,i)=>'<text x="'+X(i)+'" y="'+(H-10)+'" text-anchor="middle" font-size="9" fill="#bdb8ae">'+esc(l.slice(5))+'</text>').join('');
  const leg='<div class="lg">'+series.map((s,si)=>'<span><i style="background:'+PAL[si%PAL.length]+'"></i>'+esc(s.name)+'</span>').join('')+'</div>';
  return '<svg class="ln" viewBox="0 0 '+W+' '+H+'">'+g+lines+xl+'</svg>'+(series.length>1?leg:'');
}

function blk(title,sub,body,future){
  return '<section class="blk'+(future?' future':'')+'"><h3>'+esc(title)+(future?'<span class="future-tag">데이터 쌓이는 중</span>':'')+'</h3>'+
    (sub?'<div class="sub">'+esc(sub)+'</div>':'')+body+'</section>';
}

/* aggregations */
function aggKeywords(d){const m={};stores(d).forEach(s=>(s.keywords||[]).forEach(k=>m[k[0]]=(m[k[0]]||0)+k[1]));
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,12);}
function rated(d){return stores(d).filter(s=>s.avg_rating>0);}

/* ---------- sidebar ---------- */
function renderSide(){
  const d=latest(); const ss=stores(d);
  let h='<div class="kicker">STORE REVIEW BRIEFING</div><h1>리뷰 브리핑</h1>';
  h+='<div class="navsec">대시보드</div>';
  h+='<div class="navitem'+(VIEW.t==='dash'?' on':'')+'" onclick="goView({t:\'dash\'})">📊 종합 대시보드</div>';
  h+='<div class="navsec">매장</div>';
  h+=ss.map(s=>'<div class="navitem'+(VIEW.t==='store'&&VIEW.k===s.name?' on':'')+'" onclick="goView({t:\'store\',k:\''+esc(s.name).replace(/'/g,"")+'\'})"><span>'+esc(s.name)+'</span>'+(s.avg_rating?'<span class="mini">⭐'+s.avg_rating+'</span>':'')+'</div>').join('');
  h+='<div class="navsec">달력</div>'+calendar();
  document.getElementById('side').innerHTML=h;
}
function calendar(){
  const dates=new Set(DATA.map(d=>d.date));
  const months={};
  DATA.forEach(d=>{const m=d.date.slice(0,7);(months[m]=months[m]||true);});
  const dow=['일','월','화','수','목','금','토'];
  let h='<div class="cal">';
  Object.keys(months).sort().reverse().slice(0,3).forEach(m=>{
    const [Y,M]=m.split('-').map(Number);
    const first=new Date(Y,M-1,1).getDay(), days=new Date(Y,M,0).getDate();
    h+='<div class="mh">'+Y+'.'+String(M).padStart(2,'0')+'</div><div class="grid">';
    h+=dow.map(x=>'<div class="dow">'+x+'</div>').join('');
    for(let i=0;i<first;i++)h+='<div class="d"></div>';
    for(let dd=1;dd<=days;dd++){
      const ds=Y+'-'+String(M).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
      const has=dates.has(ds);
      h+='<div class="d'+(has?' has':'')+'"'+(has?' onclick="goView({t:\'date\',k:\''+ds+'\'})"':'')+'>'+dd+'</div>';
    }
    h+='</div>';
  });
  return h+'</div>';
}

/* ---------- views ---------- */
function goView(v){VIEW=v;renderSide();render();window.scrollTo(0,0);}

function render(){
  if(VIEW.t==='store')return viewStore(VIEW.k);
  if(VIEW.t==='date')return viewDate(VIEW.k);
  return viewDash();
}

function viewDash(){
  const d=latest(), ss=stores(d);
  const totNew=ss.reduce((a,s)=>a+(s.n_new||0),0);
  const totUn=ss.reduce((a,s)=>a+(s.unanswered||0),0);
  const avgRate=(()=>{const r=ss.filter(s=>s.reply_rate!=null);return r.length?r.reduce((a,s)=>a+s.reply_rate,0)/r.length:null;})();
  let h='<div class="h-row"><div><div class="kicker">'+esc(d.date)+'</div><h2 class="title">종합 대시보드</h2></div></div>';
  h+='<div class="cards">'+
     '<div class="card"><div class="v">'+ss.length+'</div><div class="l">매장</div></div>'+
     '<div class="card"><div class="v">'+totNew+'</div><div class="l">오늘 신규</div></div>'+
     '<div class="card"><div class="v">'+totUn+'</div><div class="l">미답변</div></div>'+
     '<div class="card"><div class="v">'+pct(avgRate)+'</div><div class="l">평균 응답률</div></div></div>';

  // 1) 별점 랭킹
  const rk=rated(d).slice().sort((a,b)=>b.avg_rating-a.avg_rating).map(s=>({label:s.name,value:s.avg_rating,disp:'⭐'+s.avg_rating}));
  const noRate=ss.filter(s=>!s.avg_rating).map(s=>s.name);
  h+=blk('별점 랭킹','네이버 평균 별점 순'+(noRate.length?' · 별점 미제공: '+noRate.join(', '):''),
        rk.length?hbar(rk,{max:5}):'<div class="note">별점 제공 매장이 없어요.</div>');

  // 2) 리더보드
  h+=blk('매장 비교 리더보드','한눈에 보는 매장별 현황',leaderboard(d));

  // 3) 응답률 / 미답변
  const rr=ss.slice().sort((a,b)=>(a.reply_rate||0)-(b.reply_rate||0)).map(s=>({label:s.name,value:(s.reply_rate||0),disp:pct(s.reply_rate),sub:'미답변 '+(s.unanswered??'—')}));
  h+=blk('응답률 & 미답변','낮은 순 — 위에 있을수록 답변이 급해요 🔥',hbar(rr,{max:1}));

  // 4) 리뷰수 추세
  h+=blk('리뷰수 추세','매장별 누적 방문자 리뷰 수',trend(ss,'reviews_total'));

  // 5) 키워드 TOP
  const kw=aggKeywords(d).map(k=>({label:k[0],value:k[1],disp:k[1]+'회'}));
  h+=blk('키워드 TOP','전 매장 최근 리뷰에서 자주 나온 키워드',kw.length?hbar(kw):'<div class="note">키워드 데이터가 없어요.</div>');

  // 6) 단골 비율
  const rp=ss.slice().sort((a,b)=>(b.repeat_ratio||0)-(a.repeat_ratio||0)).map(s=>({label:s.name,value:(s.repeat_ratio||0),disp:pct(s.repeat_ratio)}));
  h+=blk('단골 비율','최근 리뷰 중 재방문(2회+) 손님 비율',hbar(rp,{max:1}));

  // ---- 아래: 데이터 쌓이면 ----
  h+='<div class="h-row" style="margin-top:34px"><div><div class="kicker">TRENDS</div><h2 class="title" style="font-size:19px">추세 분석</h2></div></div>';
  h+=blk('별점 변화 추세','매장별 평균 별점 추이',trend(ss,'avg_rating',{yfmt:v=>v.toFixed(1)}),true);
  h+=blk('신규 리뷰 모멘텀','매장별 일 신규 리뷰 추이',trend(ss,'n_new'),true);
  h+=blk('미답변 누적 추이','쌓이는지 줄어드는지',trend(ss,'unanswered'),true);
  h+=blk('테마 강점 비교','매장이 어떤 점(맛/서비스/분위기)으로 호평받는지',themeCompare(ss),false);
  document.getElementById('main').innerHTML=h;
}

function leaderboard(d){
  const rows=stores(d).map(s=>'<tr>'+
    '<td class="nm" onclick="goView({t:\'store\',k:\''+esc(s.name).replace(/\x27/g,"")+'\'})">'+esc(s.name)+'</td>'+
    '<td>'+(s.avg_rating?'⭐'+s.avg_rating:'—')+'</td>'+
    '<td>'+num(s.reviews_total)+'</td>'+
    '<td>'+(s.unanswered??'—')+'</td>'+
    '<td>'+pct(s.reply_rate)+'</td>'+
    '<td>'+pct(s.repeat_ratio)+'</td></tr>').join('');
  return '<table class="lb"><thead><tr><th>매장</th><th>별점</th><th>총리뷰</th><th>미답변</th><th>응답률</th><th>단골</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function trend(ssLatest,metric,opt){
  const labels=daysAsc().map(d=>d.date);
  const series=ssLatest.map(s=>({name:s.name,points:daysAsc().map(d=>{const x=findS(d,s.name);return x?(x[metric]??null):null;})}));
  return line(labels,series,opt||{});
}

function themeCompare(ss){
  return '<div>'+ss.map(s=>{
    const th=(s.themes||[]).slice(0,4); if(!th.length)return '';
    const mx=Math.max(1,...th.map(t=>t.count));
    return '<div style="margin:14px 0"><div style="font-size:13px;font-weight:600;margin-bottom:6px">'+esc(s.name)+'</div>'+
      hbar(th.map(t=>({label:t.label,value:t.count,disp:num(t.count),color:'#7d7261'})),{max:mx})+'</div>';
  }).join('')+'</div>';
}

function viewStore(name){
  const d=latest(), s=findS(d,name);
  if(!s){VIEW={t:'dash'};return render();}
  let h='<div class="h-row"><div><div class="kicker">STORE</div><h2 class="title">'+esc(s.name)+'</h2></div></div>';
  h+='<div class="cards">'+
     '<div class="card"><div class="v">'+(s.avg_rating?'⭐'+s.avg_rating:'—')+'</div><div class="l">평균 별점</div></div>'+
     '<div class="card"><div class="v">'+num(s.reviews_total)+'</div><div class="l">총 리뷰</div></div>'+
     '<div class="card"><div class="v">'+(s.unanswered??'—')+'</div><div class="l">미답변</div></div>'+
     '<div class="card"><div class="v">'+pct(s.reply_rate)+'</div><div class="l">응답률</div></div>'+
     '<div class="card"><div class="v">'+pct(s.repeat_ratio)+'</div><div class="l">단골</div></div></div>';
  h+=blk('오늘의 브리핑',d.date,'<pre class="report">'+esc(s.report||'')+'</pre>');
  const kw=(s.keywords||[]).map(k=>({label:k[0],value:k[1],disp:k[1]+'회'}));
  if(kw.length)h+=blk('자주 나온 키워드','최근 리뷰 기준',hbar(kw));
  h+=blk('리뷰수 추세','이 매장 누적 리뷰',trend([s],'reviews_total'),DATA.length<2);
  document.getElementById('main').innerHTML=h;
}

function viewDate(date){
  const d=DATA.find(x=>x.date===date)||latest();
  let h='<div class="h-row"><div><div class="kicker">'+esc(d.date)+'</div><h2 class="title">그날의 브리핑</h2></div></div>';
  h+=blk('요약','매장 '+stores(d).length+'곳',leaderboard(d));
  h+=stores(d).map(s=>'<details class="det" open><summary>'+esc(s.name)+(s.avg_rating?' · ⭐'+s.avg_rating:'')+'</summary><pre class="report">'+esc(s.report||'')+'</pre></details>').join('');
  document.getElementById('main').innerHTML='<section class="blk">'+h+'</section>';
}
</script></body></html>
