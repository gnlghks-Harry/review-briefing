<style>

 summary::-webkit-details-marker{display:none}
 .date{letter-spacing:.01em}
 .count{font-size:11px;letter-spacing:.16em;color:#a39d92;font-weight:500}
 article{background:#fff;border:1px solid #ebe8e3;padding:22px 24px;margin:0 0 14px}
 h2{font-size:15px;font-weight:700;letter-spacing:.01em;margin:0 0 14px;padding-bottom:13px;border-bottom:1px solid #f0ede8}
 pre{white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:14px;line-height:1.78;color:#3a362f;margin:0}
 #err{color:#b4453a;margin-top:14px;min-height:20px;font-size:13px}

async function go(){
  const pw=document.getElementById('pw').value;
  document.getElementById('err').textContent='여는 중...';
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
    document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('gate').style.display='none';
  }catch(e){document.getElementById('err').textContent='비밀번호가 틀렸습니다';}
}
